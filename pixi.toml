[workspace]
authors = ["pedestrianlove <jsli@linux.com>"]
channels = ["nvidia/label/cuda-11.8.0", "conda-forge"]
name = "DenseMatcher"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
CUDA_HOME = "$CONDA_PREFIX"
FORCE_CUDA = "1"
PYTHONPATH = "./third_party/dift:$PYTHONPATH"

[tasks]
build = { cmd = "pip install -e ./third_party/Mask2Former && pip install -e ." }
test = { cmd = "jupyter nbconvert --execute --to notebook example.ipynb" }

[dependencies]
python = "3.9.*"
pip = ">=23,<26"
ninja = "*"
cmake = "*"
gcc_linux-64 = "11.*"
gxx_linux-64 = "11.*"
cuda-toolkit = {version = "11.8.*", channel = "nvidia/label/cuda-11.8.0"}
setuptools = "<70"

[pypi-options]
no-build-isolation = ["detectron2", "mask2former", "odise", "meshplot", "stable-diffusion", "featup", "dift", "lvis", "pycocotools", "pytorch3d"]

[pypi-dependencies]
torch = { version = "==2.0.1", index = "https://download.pytorch.org/whl/cu118" }
torchvision = { version = "==0.15.2", index = "https://download.pytorch.org/whl/cu118" }
transformers = "==4.27.0"
numpy = "==1.24.1"
packaging = "*"
wheel = "*"
xformers = ">=0.0.22, <0.0.23"
diffusers = { version = "==0.27.2", extras = ["torch"] }
ipympl = ">=0.10.0, <0.11"
triton = ">=2.0.0, <3"
pycocotools = { git = "https://github.com/cocodataset/cocoapi.git", subdirectory = "PythonAPI" }
lvis = { git = "https://github.com/lvis-dataset/lvis-api" }
odise = { path = "./third_party/ODISE", editable = true }
meshplot = { path = "./third_party/meshplot", editable = true }
stable-diffusion = { path = "./third_party/stablediffusion", editable = true }
featup = { path = "./third_party/featup", editable = true }
dift = { path = "./third_party/dift", editable = true }
pythreejs = ">=2.4.2, <3"
torch-tb-profiler = ">=0.4.3, <0.5"
pytorch3d = { git = "https://github.com/facebookresearch/pytorch3d.git", branch = "stable" }
trimesh = ">=4.11.2, <5"
rtree = ">=1.4.1, <2"
pyglet = "<2"
plyfile = ">=1.1.3, <2"
meshio = ">=5.3.5, <6"
robust-laplacian = ">=1.0.0, <2"
potpourri3d = ">=1.3, <2"
pywavefront = ">=1.3.3, <2"
pytorch-lightning = "==1.9.5"
kornia = "==0.7.2"
pillow = "==9.3.0"
matplotlib = "==3.9.3"
jupyter = ">=1.1.1, <2"
jupyterlab = ">=4.5.5, <5"
jupyter-contrib-nbextensions = ">=0.7.0, <0.8"
notebook = "==6.5.6"
igraph = "==0.11.5"
pymeshlab = ">=2022.2.post3, <2023"
huggingface-hub = "==0.25.2"
gdown = ">=5.2.1, <6"

# mask2former = { path = "./third_party/Mask2Former", editable = true }
